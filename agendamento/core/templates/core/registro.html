{% extends "core/base.html" %}
{% block title %}Cadastro — AgendaFácil{% endblock %}

{% block extra_styles %}
<style>
  body { background: linear-gradient(135deg, #EEF0FF 0%, #F8F0FF 100%); }
  .auth-wrap {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }
  .auth-card {
    background: #fff; border-radius: 20px; padding: 2.5rem;
    width: 100%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(108,99,255,.18);
  }
  .auth-logo { text-align: center; margin-bottom: 2rem; }
  .auth-logo .icon { font-size: 2.5rem; }
  .auth-logo h2 { font-size: 1.5rem; font-weight: 800; color: var(--dark); }
  .auth-logo p { font-size: .875rem; color: var(--gray-500); margin-top: .25rem; }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: .875rem; color: var(--gray-500); }
  .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
  .divider { border: none; border-top: 1px solid var(--gray-200); margin: 1.5rem 0; }
  .btn-full { width: 100%; justify-content: center; padding: .75rem; font-size: 1rem; border-radius: 10px; }

  .tipo-selector { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1rem; }
  .tipo-option { display: none; }
  .tipo-label {
    display: flex; flex-direction: column; align-items: center; gap: .4rem;
    padding: 1rem; border: 2px solid var(--gray-200); border-radius: 12px;
    cursor: pointer; transition: all .2s; text-align: center;
  }
  .tipo-label .tipo-icon { font-size: 1.75rem; }
  .tipo-label .tipo-name { font-weight: 700; font-size: .9rem; color: var(--dark); }
  .tipo-label .tipo-desc { font-size: .75rem; color: var(--gray-500); }
  .tipo-option:checked + .tipo-label {
    border-color: var(--primary); background: var(--primary-light); color: var(--primary);
  }
  .tipo-option:checked + .tipo-label .tipo-name { color: var(--primary); }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🎉</div>
      <h2>Crie sua conta</h2>
      <p>É rápido, fácil e gratuito</p>
    </div>

    <div id="alert-area"></div>

    <div class="form-group">
      <label class="form-label">Tipo de conta</label>
      <div class="tipo-selector">
        <div>
          <input type="radio" name="tipo" id="tipo_prestador" class="tipo-option" value="prestador">
          <label for="tipo_prestador" class="tipo-label">
            <span class="tipo-icon">🧑‍💼</span>
            <span class="tipo-name">Prestador</span>
            <span class="tipo-desc">Ofereço serviços</span>
          </label>
        </div>
        <div>
          <input type="radio" name="tipo" id="tipo_cliente" class="tipo-option" value="cliente" checked>
          <label for="tipo_cliente" class="tipo-label">
            <span class="tipo-icon">👤</span>
            <span class="tipo-name">Cliente</span>
            <span class="tipo-desc">Quero agendar</span>
          </label>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nome</label>
        <input type="text" id="first_name" class="form-control" placeholder="Seu nome">
      </div>
      <div class="form-group">
        <label class="form-label">Sobrenome</label>
        <input type="text" id="last_name" class="form-control" placeholder="Seu sobrenome">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" id="email" class="form-control" placeholder="seu@email.com">
    </div>

    <div class="form-group">
      <label class="form-label">Telefone (opcional)</label>
      <input type="text" id="telefone" class="form-control" placeholder="(51) 99999-9999">
    </div>

    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres">
    </div>

    <button class="btn btn-primary btn-full" onclick="fazerRegistro()">Criar conta</button>

    <hr class="divider">

    <div class="auth-footer">
      Já tem conta? <a href="{% url 'login' %}">Entrar</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
async function fazerRegistro() {
  const tipo = document.querySelector('input[name="tipo"]:checked')?.value;
  const first_name = document.getElementById('first_name').value.trim();
  const last_name  = document.getElementById('last_name').value.trim();
  const email      = document.getElementById('email').value.trim();
  const telefone   = document.getElementById('telefone').value.trim();
  const password   = document.getElementById('password').value;
  const alertArea  = document.getElementById('alert-area');

  if (!first_name || !last_name || !email || !password) {
    alertArea.innerHTML = '<div class="alert alert-error">Preencha todos os campos obrigatórios.</div>';
    return;
  }

  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = 'Criando conta…';

  const { ok, data } = await apiCall('/api/auth/registro/', 'POST', {
    tipo, first_name, last_name, email, telefone, password
  });

  btn.disabled = false; btn.textContent = 'Criar conta';

  if (ok) {
    alertArea.innerHTML = '<div class="alert alert-success">Conta criada! Redirecionando para login…</div>';
    setTimeout(() => window.location.href = '/login/', 1200);
  } else {
    alertArea.innerHTML = `<div class="alert alert-error">${data.erro || 'Erro ao criar conta.'}</div>`;
  }
}
</script>
{% endblock %}
