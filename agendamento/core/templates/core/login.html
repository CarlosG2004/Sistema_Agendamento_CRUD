{% extends "core/base.html" %}
{% block title %}Entrar — AgendaFácil{% endblock %}

{% block extra_styles %}
<style>
  body { background: linear-gradient(135deg, #EEF0FF 0%, #F8F0FF 100%); }
  .auth-wrap {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }
  .auth-card {
    background: #fff; border-radius: 20px; padding: 2.5rem;
    width: 100%; max-width: 420px;
    box-shadow: 0 20px 60px rgba(108,99,255,.18);
  }
  .auth-logo { text-align: center; margin-bottom: 2rem; }
  .auth-logo .icon { font-size: 2.5rem; }
  .auth-logo h2 { font-size: 1.5rem; font-weight: 800; color: var(--dark); }
  .auth-logo p { font-size: .875rem; color: var(--gray-500); margin-top: .25rem; }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: .875rem; color: var(--gray-500); }
  .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
  .divider { border: none; border-top: 1px solid var(--gray-200); margin: 1.5rem 0; }
  .btn-full { width: 100%; justify-content: center; padding: .75rem; font-size: 1rem; border-radius: 10px; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">📅</div>
      <h2>Bem-vindo de volta!</h2>
      <p>Entre na sua conta para continuar</p>
    </div>

    <div id="alert-area"></div>

    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" id="email" class="form-control" placeholder="seu@email.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary btn-full" onclick="fazerLogin()">Entrar</button>

    <hr class="divider">

    <div class="auth-footer">
      Não tem conta? <a href="{% url 'registro' %}">Cadastre-se grátis</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
async function fazerLogin() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('password').value;
  const alertArea = document.getElementById('alert-area');

  if (!email || !senha) {
    alertArea.innerHTML = '<div class="alert alert-error">Preencha todos os campos.</div>';
    return;
  }

  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = 'Entrando…';

  const { ok, data } = await apiCall('/api/auth/login/', 'POST', { email, password: senha });

  btn.disabled = false; btn.textContent = 'Entrar';

  if (ok) {
    alertArea.innerHTML = '<div class="alert alert-success">Login realizado! Redirecionando…</div>';
    setTimeout(() => window.location.href = '/dashboard/', 800);
  } else {
    alertArea.innerHTML = `<div class="alert alert-error">${data.erro || 'Erro ao fazer login.'}</div>`;
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
</script>
{% endblock %}
